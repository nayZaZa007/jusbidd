version: "3.9"

services:
  db:
    image: postgres:15
    container_name: jusbid-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: jusbid
    ports:
      - "5434:5432"
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: jusbid-backend
    restart: always
    ports:
      - "5002:5000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_NAME: jusbid

  frontend:
    build: ./frontend
    container_name: jusbid-frontend
    ports:
      - "5175:5173"
    depends_on:
      - backend